    "md": "# Learning Digest — 2026-06-30\n\n_Episode: Topline — \"Godfather of Modern GTM: How To Measure AI Impact\" (Mark Roberge, Stage 2 Capital)_ · _Read time: ~9 min_\n\n## Topline — Mark Roberge on measuring AI's impact on sales\n**Theme:** Decompose sales productivity into its constituent variables so you can measure where AI actually moves the needle — and a structural argument for why fast followers have an unusually wide window right now.\n\n### Revenue velocity is a control-locus decomposition, not a calculator\n**Said.** The formula is `(# opportunities × ACV × close rate) / sales cycle = revenue per rep per period`. Roberge runs it *backwards*: start from the output you want (% of reps at quota), then ask which variable is easiest to change. His answer: number of opportunities, because it's \"100% in our control\" — the others aren't.\n**First principles.** The formula's value is diagnostic, not arithmetic. Its real move is exposing that each variable is governed by a *different actor*. ACV is constrained by market positioning (raising it migrates you upmarket). Close rate and sales cycle are governed by buyer behaviour. Number of opportunities is the only variable endogenous to the selling organisation. Any multi-variable system whose inputs have different ownership structures should be factored this way: separate *who controls what* before deciding where to invest. Optimising the loudest variable (close rate *sounds* exciting) instead of the most controllable one is a category error dressed up as ambition. Endogenous wins compound; exogenous wins need other actors to cooperate.\n**Practically.** To assess any claimed productivity gain across a workflow: list every variable in the output formula, annotate each by who governs it, and concentrate investment in the endogenous ones.\n\n### Selling time — AI compresses overhead, it doesn't amplify the core\n**Said.** \"Best-in-class has historically been about 30%, and today's AI can push that to 60%+.\" Selling time = the fraction of a rep's week in live prospect/customer conversation. Going 30%→60%, all else equal, algebraically doubles output.\n**First principles.** Most knowledge-work constraints live in the *overhead wrapping* the value-creating activity, not in the activity itself. A surgeon's constraint is OR time, a lawyer's is billable hours, a salesperson's is prospect-facing conversation — and the utilisation rate of that core activity is strikingly low, because each instance generates a large administrative tail (prep, notes, follow-up, CRM, scheduling). AI compresses the tail without touching the core. The \"doubling\" isn't magic; it works precisely *because* the baseline sits so far below the theoretical ceiling. Reframed: going 30%→60% isn't an improvement, it's the removal of an unnecessary floor.\n**Practically.** For any role, ask what fraction of time currently reaches the core value-creating activity. If overhead is large (>50%), even modest overhead reduction yields big output leverage. If overhead is already small, AI's gains will show up elsewhere — don't expect them here.\n\n### Buyer-side inertia is the hard ceiling on AI sales acceleration\n**Said.** \"Vendors are highly motivated to accelerate sales actions with AI. The buyers are not feeling that same pressure.\" AI compresses seller-side steps, but the buying committee — RFPs, consensus-building, procurement, legal — runs on the buyer's clock.\n**First principles.** In any two-sided sequential process, throughput is bounded by the slowest side. This is Amdahl's Law applied to a two-party pipeline: optimising the fast side of a process bounded by a slow side yields diminishing returns on *total* throughput. Seller-side AI gains accumulate only in steps the seller owns; enterprise cycles are dominated by buyer-owned steps, so seller compression barely moves close rate or cycle time. That's exactly why Roberge excludes those two variables from his AI thesis — the bottleneck isn't on his side of the pipe.\n**Practically.** When measuring AI ROI in any two-party workflow, decompose the full timeline into steps by ownership and set targets only on the steps you own. If the bottleneck sits with the counterparty, report seller-side efficiency *separately* from end-to-end outcomes — conflating them hides where improvement actually happens.\n\n### ACV jail and the structural case for fast-following\n**Said.** Fast followers win roughly two-thirds of the time, and three forces have widened the window now: AI made product-copying ~10× faster; first movers sit at unprecedented valuation multiples that trap them in \"ACV jail\"; and the earliest AI-native products were built on already-outdated architectures.\n**First principles.** *ACV jail* is the mechanism. A company that raised at, say, 100× ARR must maximise revenue to grow into its valuation — which means maximising ACV. Dropping ACV 70% to fight a price-cutting entrant would collapse the revenue base and break growth expectations, even when it's strategically correct. This is structural, not cowardice. The fast follower also skips the first mover's two biggest hidden costs: educating the market (already paid, category now accepts the idea) and figuring out what to build (the incumbent's product is a de-facto spec). The counterweight is the *trust moat*: in markets where procurement runs on institutional legitimacy rather than price-performance (law, regulated industries), brand becomes a real barrier. Harvey in legal is the example — a marquee firm adopting it is a trust signal the category defers to, regardless of a cheaper competitor's feature parity.\n**Practically.** To judge whether a first mover is vulnerable, check three conditions: (1) does the valuation multiple create pricing rigidity; (2) is there a genuine data/network moat or is it just a software surface; (3) does the buyer care about trust/brand or price-performance? High multiple + no structural moat + price-sensitive buyer = the zone where fast-following is most lethal to the incumbent.\n\n### PMF and GTM fit are sequential tests, not simultaneous targets\n**Said.** PMF = can you create the promised value (measured by retention, with *no* regard to unit economics). GTM fit = can you acquire and serve those customers *profitably*. Roberge chases PMF \"in an unscalable manner\" before introducing economics.\n**First principles.** These are independent axes. You can have high retention (real PMF) with terrible economics (no GTM fit), or efficient acquisition (looks GTM-fit) with poor retention (no actual PMF). Conflating them corrupts the diagnostic. The reason to *sequence* them: PMF search needs maximum experimental surface — motions and use-cases you'd never try if unit economics were binding. Impose economics too early and you shrink the search to configurations that are already efficient, biasing toward local optima. And GTM fit only means something once retention is repeatable — otherwise you're optimising a leaky bucket.\n**Practically.** Run both tests independently. \"Do customers who use this stay?\" is the PMF test; \"can we acquire them at a sane cost?\" is the GTM-fit test. A company with the second but not the first is building an efficient acquisition machine for customers who leave — invisible at the top line until cohorts mature. Don't impose GTM-fit metrics until PMF is confirmed.\n\n### Cohort rotation — high-frequency measurement without survey fatigue\n**Said.** At HubSpot, with thousands of customers, they split the base into six representative cohorts and surveyed one per month. Each customer was contacted twice a year, yet the company got a fresh company-level NPS every month with updated promoter/detractor diagnostics.\n**First principles.** This resolves a structural tension: high *measurement* frequency (monthly signal for iteration) conflicts with high *contact* frequency (fatigue, falling response quality). Rotating cohorts decouples the two — but only if each cohort is genuinely representative, otherwise you're trending different populations rather than the same one. It's stratified sampling over time: full population as the unit of analysis, rotating subgroups as the sample. Applies anywhere individual contact frequency binds how often you can measure — employee engagement, UX feedback, health checks, longitudinal studies.\n**Practically.** In any repeated-feedback mechanism, separate \"signal frequency\" (how often the org learns) from \"contact frequency\" (how often any individual is asked); decouple them via rotation. The binding constraint becomes minimum subgroup size for statistical reliability, not budget or survey length.\n\n## New concepts (learned today)\n- **Revenue Velocity Formula** — `(# opps × ACV × close rate) / sales cycle`; its value is diagnostic — exposing which variable is controlled by whom — not computing a number.\n- **ACV Jail** — a structural trap where a high valuation multiple forces you to maximise contract value, making it impossible to drop price against a cheaper entrant without collapsing the revenue base.\n- **Selling Time** — % of a rep's week in live prospect/customer conversation; best-in-class historically ~30%; the variable AI most directly expands by compressing admin overhead.\n- **GTM Fit** — the stage *after* PMF: proof that customers who get the promised value can be acquired and served profitably; deliberately decoupled from PMF so premature unit-economics optimisation doesn't shrink the experimental surface.\n\n## Connections\n- PMF-vs-GTM-fit sharpens the standard NRR / CAC / LTV frame: NRR is specifically the *PMF* test and LTV/CAC is the *GTM-fit* test — they're not interchangeable proxies for \"traction,\" and applying GTM-fit metrics before PMF is confirmed manufactures false confidence.\n\n## Left out\nThe trivia quiz (Palantir rule-of-40, Twilio ARR/employee), HubSpot stock + founder-return speculation, and the book-writing banter — opinion and name-dropping with no transferable mechanism."

    "md": "# Learning Digest — 2026-06-30\n\n_Episode: The Neon Show — \"How 3 Friends From Coimbatore Run Olympics and Super Bowl | The Untold Amagi Story\"_ · _Read time: ~10 min_\n\n## The Neon Show — the Amagi story\n**Theme:** How to build durable infrastructure businesses by betting on structural position over current revenue — told through two pivots, a 30-year framing, and an Emmy.\n\n### The structural-deficiency test — pivot a *growing* business, not a dying one\n**Said.** They shut down a ₹180-crore, revenue-doubling business. \"If you're going to run it for the next thirty years, this is not a structurally solid business design.\" Their geo-targeting revenue cannibalised TV networks' own national ad sales, so those same networks throttled Amagi's pricing, distribution, and who it could sell to.\n**First principles.** Revenue trajectory and structural position are independent variables, and confusing them is one of the costliest mistakes in company-building. A business can grow while its leverage rots — customer concentration, dependence on a counterparty's goodwill for your cost structure, and a model whose very success harms the buyer. For Amagi, scale made the networks *more* hostile: growth eroded structural position instead of improving it. The right question when deciding whether to continue a line of business isn't \"are the metrics up?\" but \"does growth compound our negotiating power, switching costs and TAM ceiling — or erode them?\" Structural rot is invisible on a P&L until it collapses.\n**Practically.** Before concluding a business \"works\" because numbers are up, explicitly map what happens to structural factors (customer concentration, channel conflict, pricing control) as it scales 3× and 10×. If scale worsens them, the business is in trouble regardless of trajectory.\n\n### Irrational early adopters are the only door into risk-averse enterprise markets\n**Said.** \"These are people who felt the passion... they're delivering at speeds I've not seen. It's worth a bet. I know it's irrational in my heart, but let me take it.\" NBC handed them fringe projects first, watched the POC, then escalated to mission-critical workloads.\n**First principles.** Enterprises in high-consequence industries (broadcast, banking, aviation) build procurement processes engineered to exclude unproven vendors — RFPs, financial audits, multi-vendor bake-offs. Rational at the system level, but structurally biased toward incumbents. The only exploitable gap is the individual who *bypasses* the system: Geoffrey Moore's \"visionary,\" betting on potential and personal conviction over formal scoring. The trust ladder then runs: win a fringe project, prove delivery speed and accountability, use internal visibility to expand scope — until you're running their Super Bowl and procurement is now biased toward *keeping* you. The key counter-intuitive point: trying to look more \"rational\" (better financials, more compliance) to win early enterprise deals is the wrong move — it just makes you a worse copy of the incumbent. The only asymmetric edge is founder presence + delivery velocity that an irrational champion can point to.\n**Practically.** For a new entrant in a conservative vertical, the GTM question isn't \"how do we look credible to procurement?\" but \"who is the irrational champion inside this org, and what's the smallest project that gives *them* a visible win?\" Formality and RFP-compliance help only *after* a champion has created internal pull.\n\n### Vulnerability is the trust signal in mission-critical sales\n**Said.** A customer asked how many times they'd gone black on air. \"If you had told me never, I would not have signed the deal. We'd believe you'd never done real broadcasting.\"\n**First principles.** In high-stakes systems the buyer's mental model isn't \"will this fail?\" but \"how will this vendor behave when it inevitably does?\" A claim of zero failures is diagnostic — it means either (a) you've never operated at real stress conditions and can't be trusted with mission-critical load, or (b) your culture will deflect blame when failures come. Both disqualify. Admitting documented failures *and* demonstrating recovery competence signals two things at once: genuine operational experience and an accountable culture. This inverts commodity software, where SLA claims are table stakes and uptime is independently verifiable. In genuinely complex infrastructure, claimed perfection destroys trust; documented failure-and-recovery builds it — because the buyer has already internalised that failures happen and is really evaluating your *failure-response loop*.\n**Practically.** \"What was your worst incident and what did you change?\" is an opportunity, not a threat. Answering with specificity and demonstrated follow-through signals something no uptime guarantee can: that you'll own the problem rather than litigate the SLA.\n\n### Focus is a signal generator, not just a resource conserver\n**Said.** After the pivot: \"We'll do only one country, one product, one cohort of customers. One language, one time zone, one set of standards.\" They held this even after raising $100M+.\n**First principles.** Focus is usually framed as resource management — don't spread thin. The deeper mechanism is *signal quality*. When every customer interaction shares the same geography, product and cohort, feedback is dense and context-consistent: you can separate product signal from customer idiosyncrasy and build pattern recognition that compounds across the team. A multi-geo, multi-product strategy mixes contexts — a win might be product-market fit, a lucky customer, or a geography effect, and you can't disentangle which. There's also an alignment mechanism: when all engineers, sellers and CS reps solve variants of the *same* problem for the *same* buyer, learning accumulates in one place instead of siloing. Amagi's 24-hour loop (India builds overnight, Srini demos in LA at 9am) was only possible because the scope was narrow enough for an overnight cycle to produce demo-worthy output.\n**Practically.** \"How many things are we pursuing?\" matters less than \"do all of them share the same customer context?\" Coherent focus — same buyer, adjacent problems — yields tighter feedback loops and compounding organisational learning. Breadth across customer types or geographies creates noise that hides what's actually working, even when metrics look fine.\n\n### Late-adopter industries create the deepest first-mover switching costs\n**Said.** \"60%+ of all US TV channels run on Amagi infrastructure.\" Customers who once gave only fringe projects now call to ask if Amagi is financially healthy — \"because you are the backbone now.\"\n**First principles.** In industries where failure has asymmetric consequences (broadcast, air-traffic control, market infrastructure), buyers delay adoption longer than strictly rational — they wait for proof at high stakes before committing. So when the industry finally crosses over, the vendor who earned trust during the visionary phase is already *embedded* exactly when the rational majority starts looking. The switching costs here aren't mainly contractual — they're operational: the vendor knows your systems' edge cases, your team is trained on its tooling, your disaster-recovery plans name it explicitly, your customer SLAs derive from its uptime. Replacing it isn't a procurement decision, it's a multi-year re-engineering project. And the late-majority buyer now evaluates you on industry consensus (\"60% already use it\") rather than merit, a self-reinforcing default. Net: late adoption in risk-averse industries produces *stickier* first-mover advantage than consumer markets, precisely because the trust bar was higher to clear.\n**Practically.** In any infrastructure market with risk-averse buyers, ask \"whose trust, if earned, makes us the structural default when the late majority arrives?\" Not all early customers are equal — the ones who let you touch mission-critical workloads become references that compress the irrationality required of every later buyer.\n\n### The technology moat is dead; business moats are what compound\n**Said.** \"There's nothing called a technology moat — that's gone for everybody. When software becomes close to zero, moats are going to be business moats.\" Cites Hamilton Helmer's *Seven Powers* as the enduring lens.\n**First principles.** A technology moat is a proprietary capability others can't replicate (algorithms, patents, trade secrets). With open-source models, commoditised cloud, and AI-accelerated development, the cost to replicate any specific technical capability approaches zero over a multi-year horizon. So technology is the *entry ticket* to a market, not the source of persistent value. Business moats — Helmer's seven — are structural positions that make a competitor's entry *unprofitable even with equivalent technology*: scale economies, network effects, switching costs, counter-positioning, branding, cornered resource, process power. The load-bearing assumption is that software costs keep falling fast enough that any technical differentiation erodes within a market cycle — which the AI era makes more plausible. If true, \"what's your tech advantage?\" is a weaker diligence question than \"what makes it structurally unprofitable for a better-funded clone to displace you?\" The first is answerable with a slide; the second needs a real answer.\n**Practically.** To judge any software business's durability, identify which of Helmer's structural positions it occupies. If the answer is \"none — the value is the technology,\" that's a valuation window, not a moat. \"What happens if a well-funded competitor builds equivalent tech in 18 months?\" should have a *structural*, not technical, answer.\n\n### Time-vs-money is the structural determinant of SaaS pricing power\n**Said.** \"In India we value money more than time. In the US, time is more valuable than money... paying for something over its value is something US customers still see.\"\n**First principles.** Willingness-to-pay for SaaS is set by which resource is the buyer's *binding constraint*. When time is scarce (high labour costs, fast competition, high opportunity cost of slowness), buyers pay for speed and reliability without demanding exhaustive TCO analysis — time saved is unambiguous. When money is scarce (cost-center mindset, lower labour costs, thin margins), SaaS becomes a cost line requiring detailed ROI justification, with cheaper/slower alternatives as the default. This isn't purely cultural, it's economic — and it also drives sales-cycle length: when time is the constraint, urgency to stop wasting it outruns caution about price, so deals close faster. Corollary: a product that sells on time-savings at US enterprise pricing may need *repositioning* (not just discounting) where money is the binding constraint, because the value-proposition *category* is different, not just the price point.\n**Practically.** Before entering a new market or segment, map the buyer's binding constraint. If time isn't valued (procurement wants five quotes and a six-month approval), a speed/convenience positioning has a structural pricing problem no discount fixes — it likely needs repositioning around cost savings, which is a different proposition with different features, case studies and buyer education.\n\n## New concepts (learned today)\n- **Crossing the Chasm (Geoffrey Moore)** — adoption bell curve (innovators → early adopters/visionaries → early majority/pragmatists → late majority → laggards). The core claim: a structural \"chasm\" sits between visionaries and pragmatists because they buy differently — visionaries on potential and passion, pragmatists on proven references. Market entry must treat them as separate campaigns; winning one doesn't win the other.\n- **Seven Powers (Hamilton Helmer)** — seven durable advantages that persist against well-funded competition: scale economies, network effects, counter-positioning, switching costs, branding, cornered resource, process power. A lens for \"structural moat vs. mere tech lead.\"\n- **FAST channels (Free Ad-Supported Streaming TV)** — linear (scheduled) streaming, free to viewers, monetised entirely by ads, delivered over IP rather than cable/satellite. Distinct from SVOD (subscription). Emerged in the US ~2016–17; Amagi became the backbone for much of the US FAST ecosystem.\n\n## Connections\n- \"Technology moat is dead\" is a direct counterpoint to any AI-era thesis that proprietary model weights or fine-tuning are a durable moat — worth tracking against future episodes on AI defensibility.\n- The \"irrational early adopter\" mechanism is structurally the *same* as Crossing the Chasm's visionary-phase strategy — two shows describing one pattern from different angles.\n\n## Left out\nThe palmist origin anecdote, homeschooling/family logistics, rapid-fire book admiration beyond what was analysed, and the closing India-optimism riff — colour without a transferable mechanism."

    "md": "# Learning Digest — 2026-06-30\n\n_Episode: Langfuse — \"Langfuse Intro: Evaluations Deep Dive\"_ · _Read time: ~6 min_\n\n## Langfuse — Evaluations Deep Dive\n**Theme:** How to architect a closed feedback loop where production LLM behavior continuously populates the test dataset that governs the next development iteration. Where yesterday's Braintrust episode named the principle (eval-as-PRD, the David loop), this one shows the plumbing — where new test cases come from, how human attention gets rationed, and what makes an offline comparison actually valid.\n\n### Production is the discoverer of test cases, not just the place you debug\n**Said.** \"The main goal is to identify new test cases that you forgot to track within your datasets.\" Production monitoring feeds *back into the offline dataset* — it's not only a debugging surface.\n\n**First principles.** In traditional software the input space is bounded: finite code paths, known APIs. You can enumerate failure modes upfront and write tests *before* shipping. LLM applications invert this, because the input is open-ended natural language — the full distribution of user intent is unknowable in advance. That structural fact reverses the testing direction. Instead of *design tests → ship → monitor*, the correct flow is *ship → let production sample the true distribution → harvest the edge cases it reveals → backfill them into the offline suite*. Your offline dataset is therefore never a complete spec; it is a continuously growing approximation of what production will throw at the system, and its quality ceiling is set by how diverse a slice of production you've captured and classified. The test set chases the input distribution forever; it never closes.\n\n**Practically.** Treat the production trace store as a living discovery engine, not a log you grep when something breaks. The real high-judgment work is *deciding which traces to promote* into the dataset — that decision encodes a theory of which failure modes matter. A team that ships and never harvests is throwing away its only source of ground truth about its own input distribution.\n\n### Score provenance, not score value, determines what a signal is worth\n**Said.** Four distinct score sources: user feedback from the UI (an explicit thumbs-down), LLM-as-judge (automated, running inside the platform), human annotation via queues (a manual labeler), and custom scores ingested over API/SDK from any external system.\n\n**First principles.** These four differ on three independent axes. **Cost:** human annotation ≫ LLM-judge ≫ passive user signal ≫ fully automated. **Latency:** user feedback is real-time, human annotation is scheduled, CI evals are batch. **Ground-truth distance:** human judgment *is* the reference; user feedback is noisy but measures actual utility; the LLM-judge introduces model bias that is *correlated with the production model itself* — the most dangerous kind, because the judge can be blind in exactly the places the system is. A stack that treats all four as interchangeable is confusing throughput with reliability. The right structure is a portfolio: cheap automated signals triage at scale, expensive human signals anchor calibration where the error category actually matters. This is the same architecture as any serious measurement system — continuous cheap sensors plus periodic ground-truth audits. The audit never replaces the sensor; it tells you how much to trust it.\n\n**Practically.** Design the eval stack as a funnel, not a flat list of metrics. Run the LLM-judge on sampled traffic to estimate the *proportions* of each failure category; use that distribution to decide where to spend scarce human-labeling budget; use the human labels to check whether the judge is systematically biased on that category. The judge's job is to point; the human's job is to calibrate the pointer.\n\n### The annotation queue is a work-routing primitive — its filter is the whole point\n**Said.** Filter traces by criteria (e.g. \"user feedback = 0 in the last 7 days\"), batch-select, push to a named queue with a defined eval schema, route to labelers. \"Thread-safe, can scale to hundreds of annotators.\"\n\n**First principles.** Human labeling attention is a constrained, high-unit-cost resource. With no routing layer, labelers face the full undifferentiated production stream — most of which carries no signal, because the model handled it fine. An annotation queue is really a *priority queue where the filter logic is the intellectual work*: it encodes a theory of which regions of the input-output space are informative. The queue also decouples **capture** (async, continuous, production time) from **review** (batched, human time), which both prevents two labelers re-labeling the same trace and stops the human from being flooded by real-time volume. It's structurally identical to incident triage in on-call: the alert-routing rules are where the domain knowledge lives, and the queue enforces orderly processing under load.\n\n**Practically.** The value of an annotation queue is almost entirely in its filter criteria. A queue that fires on every trace is useless; one that fires on \"user explicitly complained AND automated score below threshold\" isolates the failure signal and makes the human's time count. If you find yourself tuning the labeling UI before the filter, you're optimizing the wrong layer.\n\n### A dataset run is only valid if the dataset is the held-constant axis\n**Said.** A dataset run is a named, versioned execution of a prompt or model config against a fixed dataset; multiple runs show up as columns in a side-by-side grid, letting you compare any two changes on identical inputs.\n\n**First principles.** This puts a concrete mechanism under eval-as-PRD. To measure whether a change *helped*, you need two things: the stimulus held constant (same inputs) and the treatment varied (different prompt, model, or retrieval). The versioned dataset run operationalizes this by making the dataset the fixed axis and the experiment the varying one. Why this matters: relative comparison (\"did this change improve quality on this input set?\") is always more tractable than absolute assessment (\"is this output good?\"), because it collapses a hard open-ended judgment into a differential. It is an offline A/B test — and just as an online A/B test is only meaningful because the traffic split holds the population constant, a dataset run is only meaningful because the input set is frozen.\n\n**Practically.** Hold the dataset stable while the prompt/model changes. If you extend the dataset *and* change the prompt in the same step, you've destroyed the controlled comparison — you can no longer tell \"the prompt improved\" from \"the new inputs happened to be easier.\" Grow the dataset and evaluate changes as two separate, non-overlapping operations.\n\n## New concepts (learned today)\n- **Trace (LLM observability)** — a structured, hierarchical log of every LLM call, tool invocation, retrieval step, and intermediate state within a single application request; the atomic unit of inspection for debugging and evaluation. It preserves the full causal chain from user input to final response, so you can reconstruct *where* and *why* the system deviated after the fact.\n- **Dataset Run (Experiment)** — a named, versioned execution of a prompt/model/config against a fixed, stable eval dataset, producing one comparable row in a side-by-side table. The fixed dataset is the controlled variable; the run config is the treatment. Triggerable from CI, a notebook, or the UI.\n\n## Connections\n- **This episode is the upstream half of yesterday's David loop.** The David loop (Braintrust/How I AI, 2026-06-29) specified *when* to invoke human review and *how* to gate it behind a passing threshold. This episode supplies what was missing: *where new test material comes from* — production is the discovery oracle (Idea 1), and the annotation-queue filter (Idea 3) is the literal implementation of the loop's \"gate expert review behind a threshold.\"\n- **The dataset run concretizes eval-as-PRD.** Eval-as-PRD named the principle — a dataset of (input, expected) pairs as the spec. This episode shows the artifact: a versioned, comparable run object, and makes explicit *why* the dataset must be frozen for any comparison to mean anything. Principle → mechanism.\n- **Tension worth noting:** the LLM-judge bias point (Idea 2) is a quiet warning about leaning too hard on the automated scoring that eval-as-PRD makes so cheap. The judge correlates with the production model, so a fully automated loop can be confidently blind. The human-annotation portfolio is the structural answer — the two episodes agree, but only this one names the failure mode.\n\n## Left out\nSDK syntax, score-schema configuration, data-region routing, and the UI walkthrough — Langfuse-specific implementation detail with no transferable mechanism underneath."

    "md": "# Learning Digest — 2026-06-29\n\n_Episode: How I AI — Ankur Goyal (Braintrust CEO), \"coding agents for hard infra work + demystifying evals\"_ · _Read time: ~9 min_\n\n## How I AI — Ankur Goyal (Braintrust)\n**Theme:** When a model can write code competently, the scarce skill shifts from *authoring solutions* to *specifying the target precisely and verifying it rigorously* — which reframes both deep systems work and AI-product development as the single discipline of building feedback loops.\n\n---\n\n### A hard eval is the unit that makes background autonomy safe and productive\n**Said.** _\"If you create the right tests and success criteria for a model, then it can be really creative and it can work on this stuff in the background.\"_\n\n**First principles.** Autonomous search is only as good as its objective function. An agent exploring a solution space is running an optimizer — and an optimizer with a sharp, cheap-to-evaluate, hard-to-game objective converges on real improvement, while one with a vague or gameable objective wanders or overfits. What unlocks the \"creativity\" is an **asymmetry of effort**: specifying *what good looks like* is far cheaper than searching over *how to achieve it*, and once the verifier is automated, the search can run arbitrarily long without spending human attention. It's the same structure that makes problems tractable when verification is cheap even though generation is expensive — **value accrues to whoever owns the verifier.** Generalises to any domain where the test can be mechanized (compilers, benchmarks, property tests, simulators): the test, not the solution, is the durable asset.\n\n**Practically.** Before handing open-ended work to an autonomous process, ask: *can I write a cheap, faithful, hard-to-cheat check of success?* If yes, you can let it run far harder and longer than any human would. If no, autonomy produces confident garbage. Build the verifier first, the solver second.\n\n### Practical quality beats theoretical quality, because attention decays and rigor is unbounded\n**Said.** _\"There's no staff engineer who is running as many rigorous benchmarks and trying out different algorithms… than someone who's using an agent.\"_\n\n**First principles.** The steelman for \"humans do hard things better\" assumes an idealized human with perfect, inexhaustible attention. That assumption is the load-bearing one, and it's false in practice: human rigor is bounded by sleep, by context-decay across days, and by a steep aversion to tedious-but-necessary work (benchmarking the *slow* path, not just the fast one). The real production failure mode of expert engineering isn't bad reasoning — it's **skipped verification**: you benchmark the two cases reviewers will catch and bluff the rest. An agent drops the marginal cost of the boring check to ~zero, so the binding constraint moves from \"can a human be bothered\" to \"is the check even specified.\" The generalisation: when quality is gated by tedious-but-automatable verification, the right comparison isn't *peak human skill vs. machine skill* — it's *exhaustive cheap rigor vs. selective expensive rigor*, and exhaustive wins on the long tail.\n\n**Practically.** Separate \"theoretical best case\" from \"what actually ships.\" Where quality is lost to skipped checks rather than missing insight, the gain from automation is coverage and consistency, not cleverness. Audit where your *own* rigor quietly stops — the benchmarks you \"didn't get to\" — because that gap is the opportunity.\n\n### Programming as \"defining the *what*\" — the same shift, applied recursively\n**Said.** _\"Machine learning… shifts the task of programming from being about the how to being about the what.\"_\n\n**First principles.** ML, evals, and agent-coding are all the *same move*: stop dictating the procedure; specify the objective plus a substrate that searches for the procedure. Linear regression already did it (you supply points and a loss; slope/intercept are *found*, not written). Transformers generalize it (objective = next-token prediction; the \"how\" is whatever the GPUs discover). Evals apply it to product behavior; agentic coding applies it to implementation. The deep point: **\"the what\" is itself a ladder of abstraction levels**, and each new tool lets you climb one rung higher — from writing the algorithm, to specifying success criteria, to specifying the criteria *for the criteria*. It pays off because stating a constraint succinctly is usually exponentially cheaper than satisfying it, so leverage flows to whoever can compress the problem into the tightest faithful objective. A working definition of expertise in this regime: knowing *what* to demand and *how to check it* — not *how* to build it.\n\n**Practically.** On any problem, split the layer where your judgment is irreplaceable (defining and verifying the target) from the layer that can be searched (the implementation). Push your effort *up* the abstraction ladder until you're only spending it on what a search process genuinely can't supply.\n\n### Bloom filters: a \"wrong-on-the-cheap-side\" data structure\n**Said.** _\"Bloom filters kind of have a bad reputation, but they worked out to be very effective in this case\"_ — found after a week of continuous index experiments.\n\n**First principles.** A Bloom filter is a small bit-array plus *k* hash functions: to insert, set the *k* bits each hash points to; to test membership, check whether all *k* are set. Its power is a deliberate **one-sided error** — it can say \"definitely not present\" with certainty, but \"possibly present\" only probabilistically (never a false negative, sometimes a false positive). That asymmetry is exactly what the needle-in-billions query needs: cheaply eliminate the vast majority of blocks that *cannot* contain the match, and pay the expensive exact lookup only on the survivors. The mechanism generalises to a whole class of **approximate pre-filters**: trade a bounded, controllable error *in the harmless direction* for an enormous reduction in expensive work. Its \"bad reputation\" comes from judging it on standalone accuracy rather than on its role as a cheap front-line gate before an exact check — context, not the structure, decides whether it's good.\n\n**Practically.** When an exact operation is expensive and most inputs don't qualify, look for a cheap probabilistic pre-filter whose errors fall only on the safe side (false positives you'll re-check, never false negatives you'd miss). Evaluate such components by their *role in the pipeline*, not by isolated accuracy — a \"low-quality\" part can be the right one in the right slot.\n\n### The column-store / execution-engine matrix, and the EC2↔S3 latency wall\n**Said.** Exhaustively _\"trying every open source column store format… and every column store execution engine… computing the matrix,\"_ and testing _\"4,000 concurrent reads\"_ of real EC2↔S3 latency.\n\n**First principles.** Two independent things are being separated. (1) **Storage format** (column-store) lays data out by column rather than by row, so an analytical query touching a few attributes over billions of records reads only those columns' contiguous bytes — and homogeneous columns compress far better, slashing I/O, the true bottleneck. (2) **Execution engine** is the orthogonal question of *how* the scan/filter/aggregate runs over that layout (vectorized batches, predicate pushdown, etc.). Because they're independent axes, the right move is a Cartesian sweep — the \"matrix\" — since the best pairing isn't deducible a priori. The deeper constraint is physical: with data in object storage (S3) and compute in EC2, performance is governed not by CPU but by **how many concurrent reads you can issue and overlap against network round-trip latency**. The whole problem becomes latency-hiding: keep enough requests in flight that latency is amortized. Generalises to any disaggregated storage-compute system, where the binding limit moves from local cycles to network parallelism.\n\n**Practically.** For scan-heavy/analytical workloads, treat data layout and execution strategy as separate, independently-tunable axes — and *sweep* the combinations rather than assuming the best one. Wherever storage and compute are physically separated, reason about throughput as **concurrency × per-request latency**: the lever is how many reads you keep in flight and interleave, not raw compute.\n\n### Carving, not constructing — and why a complaint usually means *delete*\n**Said.** _\"Product building and code writing now looks like carving rather than constructing… 90% of the time someone complains, we remove the thing.\"_\n\n**First principles.** When the marginal cost of producing features collapses toward zero, the scarce resource flips from *creation* to *subtraction*. Construction assumes each addition is expensive, so you add deliberately; carving assumes material is nearly free, so the work is removing excess to reveal a coherent whole. Why a complaint usually means *delete*: a complaint is evidence that some piece of complexity created confusion, and once you understand the user's actual point of view you can often redesign so the **underlying complexity never needs to exist** — removing the cause beats patching the symptom (their command-F example: a powerful cross-span search *was* the confusion; simplifying it was the fix). This is a law of cheap-generation regimes: as production cost falls, feature-bloat/entropy becomes the *default* failure mode, and editorial judgment — what to remove — becomes the differentiator. CI plays the dual role: it's the verifier that *earns the right to move fast* — the same \"build the check first\" logic applied to shipping.\n\n**Practically.** Wherever output is cheap to generate, assume the default failure is excess, and treat deletion/simplification as primary work, not cleanup. Read a complaint as a signal to *remove* confusing complexity, not to add an explanatory feature. And gate speed behind your verification layer — when you feel slow, the fix is often improving the check (CI/tests), which then lets everything else move faster.\n\n## New concepts (learned today)\n- **Bloom filter** — compact bit-array + *k* hash functions giving probabilistic set membership with one-sided error: \"definitely not in set\" is certain, \"possibly in set\" can be a false positive, never a false negative. Used as a cheap pre-filter to skip expensive exact lookups on data that provably can't match.\n- **Column store (vs row store)** — storage layout grouping values by column instead of by row, so analytical queries read only the needed columns (and compress them well, cutting I/O). Orthogonal to the *execution engine* that scans/filters/aggregates over the layout.\n- **Disaggregated storage-compute (EC2↔S3 pattern)** — architecture where data lives in object storage and compute is separate, so query performance is bound by network concurrency/latency (how many reads you can issue and interleave), not local CPU.\n- **The \"agent line\"** — a mental threshold: any decision where handing the same information to an agent would yield the same result sits *below the line* and should be delegated; the line rises as you build better skills/integrations, freeing attention for what's above it.\n- **Carving vs constructing** — in cheap-generation regimes, building shifts from deliberate addition (each feature costly) to subtraction (removing excess from near-free material); editorial deletion becomes the scarce skill.\n\n## Connections\n- **\"Hard eval makes autonomy safe\"** and **\"CI earns the right to move fast\"** are the *same mechanism* — build the verifier first — applied to AI products vs. software shipping. Both are the engineering twin of the ledger's **Eval-as-PRD**.\n- **\"Programming as defining the *what*\"** is the parent abstraction that **Eval-as-PRD** and **LLM-as-judge** (both in the ledger) are concrete instances of: specify the *what* + a substrate that searches the *how*.\n- The **\"David loop\"** (ledger) recurs with new depth on *why* it scales the expert rather than replacing them: the quantitative evals act as a cheap pre-filter (Bloom-filter-like) so the scarce tastemaker is spent only on the survivors — applying his palette to *more* cases, not fewer.\n\n## Left out\nOnly true filler: the no-meetings-after-noon / maker-vs-manager riff (motivational, no transferable mechanic past \"make focus time\"), the TMUX/Portless/work-tree tooling logistics (un-generalisable tool name-dropping), the laptop-at-dinner anecdote, and sponsor reads. **Kept** the column-store / Bloom-filter / EC2↔S3 systems material in full despite it being \"non-actionable\" — that depth is the point now."

<script>
  const DIGESTS = JSON.parse(document.getElementById('digest-data').textContent);
  const listEl = document.getElementById('list');
  const docEl  = document.getElementById('doc');
  const qEl    = document.getElementById('q');
  let active = -1;

  function render(i){
    active = i; const d = DIGESTS[i];
    docEl.innerHTML = d ? marked.parse(d.md) : '';
    [...listEl.children].forEach((c,idx)=>c.classList.toggle('active', idx===i));
    document.querySelector('.main').scrollTop = 0;
  }

  function buildList(filter){
    listEl.innerHTML='';
    const f=(filter||'').toLowerCase();
    DIGESTS.forEach((d,i)=>{
      const hay=(d.theme+' '+d.show).toLowerCase();
      if(f && !hay.includes(f)) return;
      const b=document.createElement('button');
      b.className='item'+(i===active?' active':'');
      b.innerHTML='<div class="theme">'+d.theme+'</div><div class="meta">'+d.show+' · '+d.date+'</div>';
      b.onclick=()=>render(i);
      listEl.appendChild(b);
    });
  }

  qEl.addEventListener('input', e=>buildList(e.target.value));
  if(DIGESTS.length){ buildList(''); render(0); }
  else { docEl.className='empty'; docEl.textContent='No digests yet. Run /digest to create one.'; }
</script>
